<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Pembantu Anggota - Ukoperasi</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/app.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
</head>
<body x-data="app()" class="app-layout">
  <div class="sidebar-overlay" :class="{'show': sidebarOpen}" @click="sidebarOpen = false"></div>
  
  <aside class="sidebar" :class="{'open': sidebarOpen}">
    <!-- Sidebar navigation (Simplified for this view) -->
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="ri-leaf-fill"></i></div>
      <div><div class="sidebar-logo-text">Ukoperasi</div><div class="sidebar-logo-sub">SAK EP COMPLIANT</div></div>
    </div>
    <div class="sidebar-nav">
       <a href="/pages/anggota.html" class="nav-item"><i class="ri-arrow-left-line icon"></i> Kembali ke Daftar</a>
    </div>
  </aside>

  <main class="main-content" x-data="ledgerModule()">
    <header class="topbar">
      <button class="topbar-btn md:hidden" @click="sidebarOpen = true"><i class="ri-menu-line"></i></button>
      <h1 class="topbar-title">Buku Pembantu Anggota (360° View)</h1>
    </header>

    <div class="page-content" x-cloak>
      <div class="flex justify-between items-end mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <div class="flex gap-6 items-center">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl font-black shadow-lg shadow-blue-200" x-text="anggota.nama?.charAt(0)"></div>
            <div>
                <h2 class="text-2xl font-black text-slate-800" x-text="anggota.nama"></h2>
                <div class="flex gap-3 text-sm mt-1">
                    <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-mono font-bold" x-text="anggota.no_anggota"></span>
                    <span class="text-slate-400 font-medium" x-text="anggota.nik"></span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <select x-model="tahun" @change="loadLedger()" class="btn btn-secondary py-2">
                <option value="2024">Tahun 2024</option>
                <option value="2025">Tahun 2025</option>
                <option value="2026">Tahun 2026</option>
            </select>
            <button onclick="window.print()" class="btn btn-primary"><i class="ri-printer-line"></i> Cetak Ledger</button>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
         <div class="card bg-emerald-600 text-white p-6 border-none shadow-xl shadow-emerald-100">
            <div class="text-emerald-100 text-xs font-bold uppercase tracking-wider mb-1">Total Simpanan</div>
            <div class="text-3xl font-black" x-text="formatRp(totalSimpanan)"></div>
         </div>
         <div class="card bg-blue-600 text-white p-6 border-none shadow-xl shadow-blue-100">
            <div class="text-blue-100 text-xs font-bold uppercase tracking-wider mb-1">Total Belanja (YTD)</div>
            <div class="text-3xl font-black" x-text="formatRp(totalBelanja)"></div>
         </div>
         <div class="card bg-slate-800 text-white p-6 border-none shadow-xl shadow-slate-200">
            <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Kewajiban Pinjaman</div>
            <div class="text-3xl font-black" x-text="formatRp(totalPinjaman)"></div>
         </div>
      </div>

      <div class="card p-0 overflow-hidden shadow-2xl border-slate-200/50">
        <div class="bg-slate-50 border-b px-6 py-4 flex justify-between items-center">
            <h3 class="font-black text-slate-700 uppercase tracking-tighter flex items-center gap-2">
                <i class="ri-history-line text-blue-600"></i> Riwayat Transaksi Konsolidasi
            </h3>
            <div class="flex gap-4 text-[10px] font-bold">
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-full"></span> SIMPANAN</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-500 rounded-full"></span> BELANJA</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span> PINJAMAN</span>
            </div>
        </div>
        <div class="table-wrap">
          <table class="w-full">
            <thead>
              <tr class="bg-slate-100/50">
                <th class="w-32">Tanggal</th>
                <th class="w-24">Kategori</th>
                <th>Keterangan</th>
                <th class="text-right w-48">Nominal</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in ledger" :key="item.tanggal + item.keterangan">
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">
                  <td class="font-mono text-xs font-bold text-slate-500" x-text="formatDate(item.tanggal)"></td>
                  <td>
                    <span class="px-2 py-0.5 rounded-[4px] text-[10px] font-black uppercase tracking-wider"
                          :class="{
                            'bg-emerald-100 text-emerald-700': item.kategori === 'SIMPANAN',
                            'bg-blue-100 text-blue-700': item.kategori === 'BELANJA',
                            'bg-purple-100 text-purple-700': item.kategori === 'PINJAMAN'
                          }" x-text="item.kategori"></span>
                  </td>
                  <td class="text-sm font-medium text-slate-700" x-text="item.keterangan"></td>
                  <td class="text-right font-mono font-black" :class="item.jenis === 'setoran' || item.kategori === 'SIMPANAN' ? 'text-emerald-600' : 'text-slate-800'" x-text="formatRp(item.nominal)"></td>
                </tr>
              </template>
              <tr x-show="ledger.length === 0">
                <td colspan="4" class="py-20 text-center text-slate-400 font-bold italic">Belum ada aktivitas finansial di tahun ini.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    function ledgerModule() {
      return {
        anggotaId: new URLSearchParams(window.location.search).get('id'),
        anggota: {},
        ledger: [],
        tahun: new Date().getFullYear().toString(),
        totalSimpanan: 0,
        totalBelanja: 0,
        totalPinjaman: 0,

        async init() {
          if (!this.anggotaId) {
             Toast.error('ID Anggota tidak ditemukan.');
             return;
          }
          await this.loadAnggota();
          await this.loadLedger();
        },

        async loadAnggota() {
            try {
                const res = await api.anggota.detail(this.anggotaId);
                this.anggota = res.data;
            } catch (err) { Toast.error(err.message); }
        },

        async loadLedger() {
            try {
                const res = await api.anggota.ledger(this.anggotaId, { tahun: this.tahun });
                this.ledger = res.data;
                
                // Recalculate Totals
                this.totalSimpanan = this.ledger.filter(l => l.kategori === 'SIMPANAN').reduce((s,l) => s + l.nominal, 0);
                this.totalBelanja = this.ledger.filter(l => l.kategori === 'BELANJA').reduce((s,l) => s + l.nominal, 0);
                this.totalPinjaman = 0; // Needs separate API for exact current balance if needed
            } catch (err) { Toast.error(err.message); }
        }
      }
    }
  </script>
</body>
</html>
