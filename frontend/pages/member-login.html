<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login Anggota - Ukoperasi Portal</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body class="bg-slate-100" x-data="memberLogin()">
  
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      
      <!-- Logo App -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-600 mb-4 shadow-lg shadow-emerald-500/20">
          <i class="ri-leaf-line text-4xl text-slate-800"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Member Portal</h1>
        <p class="text-slate-600">Silakan login dengan No Anggota & NIK valid Anda</p>
      </div>

      <!-- Auth Card -->
      <div class="card p-6 sm:p-8 backdrop-blur-xl bg-white/80 border border-slate-200/50">
        
        <form @submit.prevent="submit" class="space-y-5">
           <!-- Error Banner -->
           <div x-show="errorMsg" class="bg-rose-500/10 border border-rose-500/30 text-rose-600 px-4 py-3 rounded-lg text-sm flex items-start gap-3" style="display: none;">
             <i class="ri-error-warning-line mt-0.5"></i>
             <span x-text="errorMsg"></span>
           </div>
           
           <div class="space-y-1 block">
             <label class="block text-sm font-medium text-slate-600">Nomor Anggota</label>
             <div class="relative">
               <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                 <i class="ri-user-smile-line text-slate-600"></i>
               </div>
               <input type="text" x-model="no_anggota" class="form-control pl-10 h-12 text-lg font-mono" placeholder="Kop-001" required>
             </div>
           </div>

           <div class="space-y-1 block">
             <label class="block text-sm font-medium text-slate-600">NIK (Nomor Induk Kependudukan)</label>
             <div class="relative">
               <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                 <i class="ri-fingerprint-line text-slate-600"></i>
               </div>
               <input type="password" x-model="nik" class="form-control pl-10 h-12 text-lg font-mono tracking-[0.2em]" placeholder="16 Digit NIK KTP" required>
             </div>
           </div>

           <div class="pt-2">
             <button type="submit" class="btn btn-primary w-full h-12 text-base shadow-lg shadow-emerald-600/30" :disabled="loading">
               <span x-show="!loading">Masuk Portal PWA</span>
               <span x-show="loading"><i class="ri-loader-4-line spin"></i> Memverifikasi...</span>
             </button>
           </div>
        </form>

      </div>
      
      <p class="text-center text-slate-600 text-sm mt-8">Ukoperasi Mobile &copy; 2026. <br><a href="/pages/login.html" class="text-blue-600 hover:underline">Login Pengurus / Kolektor</a></p>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/modules/member.js"></script>
</body>
</html>
