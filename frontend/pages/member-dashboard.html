<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Anggota - Ukoperasi</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
    /* Bottom Navigation Bar for Mobile */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(30,30,40,0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0; z-index: 50; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 11px; gap: 4px; transition: all 0.2s; }
    .bottom-nav-item.active { color: #10b981; }
    .bottom-nav-item i { font-size: 24px; pointer-events: none; }
    .mobile-container { padding-bottom: 80px; } /* Space for navbar */
  </style>
</head>
<body x-data="memberDashboard()">
  
  <div class="max-w-md mx-auto min-h-screen bg-slate-100 shadow-2xl mobile-container" x-show="!loading" style="display: none;">
    
    <!-- Top App Bar -->
    <header class="bg-gradient-to-r from-emerald-600 to-teal-700 text-slate-800 p-5 rounded-b-3xl shadow-lg relative overflow-hidden">
       <!-- Decorative bubble -->
       <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
       
       <div class="flex justify-between items-center relative z-10">
         <div>
           <p class="text-sm opacity-90 font-medium">Selamat Beraktivitas,</p>
           <h2 class="text-xl font-bold" x-text="user?.nama"></h2>
         </div>
         <div class="h-10 w-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm border border-white/30">
           <i class="ri-user-smile-line text-xl"></i>
         </div>
       </div>

       <!-- Main Balance Card -->
       <div class="mt-8 mb-2">
         <p class="text-sm opacity-80 mb-1">Total Saldo Simpanan</p>
         <h1 class="text-4xl font-bold font-mono tracking-tight text-slate-800 drop-shadow-md">
            <span class="text-lg align-top mr-1 opacity-70">Rp</span><span x-text="formatRp(data.total_simpanan).replace('Rp', '')"></span>
         </h1>
       </div>
    </header>

    <div class="p-5 space-y-6">

       <!-- Actions Row -->
       <div class="grid grid-cols-3 gap-3">
         <button onclick="window.location.href='#aktivitas'" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl gap-2 active:scale-95 transition-transform border border-slate-200/50 hover:bg-slate-700/50">
           <div class="w-12 h-12 bg-emerald-500/20 text-blue-600 font-semibold rounded-full flex items-center justify-center text-xl"><i class="ri-file-list-3-line"></i></div>
           <span class="text-xs font-semibold">Mutasi</span>
         </button>
         <button @click="document.getElementById('modal-pinjam').classList.add('active')" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl gap-2 active:scale-95 transition-transform border border-slate-200/50 hover:bg-slate-700/50">
           <div class="w-12 h-12 bg-blue-500/20 text-blue-600 rounded-full flex items-center justify-center text-xl"><i class="ri-hand-coin-line"></i></div>
           <span class="text-xs font-semibold">Pinjam</span>
         </button>
         <button onclick="window.location.href='#pinjaman'" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl gap-2 active:scale-95 transition-transform border border-slate-200/50 hover:bg-slate-700/50">
           <div class="w-12 h-12 bg-amber-500/20 text-amber-600 rounded-full flex items-center justify-center text-xl"><i class="ri-wallet-3-line"></i></div>
           <span class="text-xs font-semibold">Tagihan</span>
         </button>
       </div>

       <!-- Rincian Simpanan -->
       <div>
         <h3 class="font-bold text-slate-600 mb-3 flex items-center justify-between">
            Rincian Simpanan
            <span class="text-xs font-normal text-slate-600 bg-white px-2 py-1 rounded-full text-right" x-text="data.saldo_simpanan.length + ' Rekening'"></span>
         </h3>
         <div class="flex flex-col gap-3">
            <template x-for="s in data.saldo_simpanan" :key="s.id">
               <div class="bg-white border border-slate-200/50 rounded-xl p-4 flex justify-between items-center">
                  <div class="flex items-center gap-3">
                     <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-slate-600">
                        <i class="ri-safe-fill"></i>
                     </div>
                     <div>
                        <div class="font-bold text-sm text-slate-800" x-text="s.SimpananJeni.nama"></div>
                        <div class="text-xs text-slate-600" x-text="'Ref: ' + s.id.split('-')[0]"></div>
                     </div>
                  </div>
                  <div class="font-mono font-bold text-blue-600 font-semibold" x-text="formatRp(s.saldo)"></div>
               </div>
            </template>
         </div>
       </div>

       <!-- Tagihan Pinjaman Aktif -->
       <div id="pinjaman">
         <h3 class="font-bold text-slate-600 mb-3 flex items-center justify-between">
            Pinjaman Anda
            <span class="font-mono text-sm text-amber-600" x-text="formatRp(data.total_sisa_pinjaman)"></span>
         </h3>
         
         <div x-show="data.pinjaman_aktif.length === 0" class="bg-white/50 border border-dashed border-slate-200 rounded-xl p-6 text-center text-slate-600 text-sm">
            Saat ini Anda tidak memiliki pinjaman aktif terdaftar.
         </div>

         <div class="flex flex-col gap-3">
            <template x-for="p in data.pinjaman_aktif" :key="p.id">
               <div class="bg-white border-l-4 border border-slate-200/50 rounded-xl p-4" 
                    :class="p.status === 'diajukan' ? 'border-l-blue-500' : (p.status === 'cair' ? 'border-l-amber-500' : 'border-l-emerald-500')">
                  <div class="flex justify-between items-start mb-2">
                     <div>
                        <div class="font-bold text-sm" x-text="p.no_pinjaman"></div>
                        <div class="text-xs text-slate-600" x-text="p.tujuan"></div>
                     </div>
                     <span class="text-[10px] px-2 py-0.5 rounded-full uppercase font-bold tracking-wider" 
                           :class="p.status === 'diajukan' ? 'bg-blue-500/20 text-blue-600' : (p.status === 'cair' ? 'bg-amber-500/20 text-amber-600' : 'bg-emerald-500/20 text-blue-600 font-semibold')"
                           x-text="p.status"></span>
                  </div>
                  <div class="flex justify-between items-end mt-4 pt-3 border-t border-slate-200">
                     <div class="text-xs text-slate-600">Tenor: <span class="text-slate-800 font-bold" x-text="p.jangka_waktu"></span> Bln</div>
                     <div class="text-right">
                        <div class="text-[10px] text-slate-600 uppercase tracking-wider">Sisa Pokok</div>
                        <div class="font-mono font-bold text-slate-800 text-lg" x-text="formatRp(p.sisa_pokok)"></div>
                     </div>
                  </div>
               </div>
            </template>
         </div>
       </div>

       <!-- Aktivitas / Mutasi Terakhir -->
       <div id="aktivitas">
         <h3 class="font-bold text-slate-600 mb-3">Mutasi Terakhir</h3>
         <div x-show="data.mutasi.length === 0" class="text-center text-sm text-slate-600 p-4">Belum ada transaksi.</div>
         <div class="flex flex-col relative before:absolute before:inset-y-0 before:left-5 before:w-0.5 before:bg-slate-700 ml-2">
            
            <template x-for="m in data.mutasi" :key="m.id">
               <div class="relative flex items-start gap-4 mb-6 group">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center relative z-10 shrink-0 border-4 border-slate-900"
                       :class="m.tipe === 'setoran' ? 'bg-emerald-500/20 text-blue-600 font-semibold' : 'bg-rose-500/20 text-rose-600'">
                     <i :class="m.tipe === 'setoran' ? 'ri-arrow-down-line' : 'ri-arrow-up-line'"></i>
                  </div>
                  <div class="flex-1 min-w-0 bg-white p-3 rounded-xl border border-slate-200/50">
                     <div class="flex justify-between items-start mb-1">
                        <div class="font-bold text-sm capitalize truncate" x-text="m.tipe + ' ' + m.jenis"></div>
                        <div class="font-mono font-bold whitespace-nowrap" :class="m.tipe === 'setoran' ? 'text-blue-600 font-semibold' : 'text-rose-600'">
                           <span x-text="m.tipe === 'setoran' ? '+' : '-'"></span> <span x-text="formatRp(m.nominal).replace('Rp','')"></span>
                        </div>
                     </div>
                     <div class="flex justify-between items-center">
                        <div class="text-[11px] text-slate-600" x-text="m.tanggal"></div>
                        <div class="text-[11px] text-slate-600 font-mono">Saldo: <span x-text="formatRp(m.saldo_sesudah).replace('Rp','')"></span></div>
                     </div>
                     <div class="text-xs text-slate-600 mt-1" x-text="m.keterangan || '-'"></div>
                  </div>
               </div>
            </template>

         </div>
       </div>

    </div>
  </div>

  <div x-show="loading" class="min-h-screen flex items-center justify-center bg-slate-100">
     <div class="flex flex-col items-center gap-4">
        <div class="spinner"></div>
        <div class="text-blue-600 font-mono text-xs tracking-wider">SINKRONISASI DATA...</div>
     </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav max-w-md mx-auto" x-show="!loading" style="display: none;">
     <button class="bottom-nav-item active">
       <i class="ri-home-5-fill"></i>
       Beranda
     </button>
     <button class="bottom-nav-item hover:text-slate-800" onclick="window.location.href='#aktivitas'">
       <i class="ri-history-line"></i>
       Riwayat
     </button>
     <button class="bottom-nav-item hover:text-slate-800 text-rose-600" @click="logout()">
       <i class="ri-logout-circle-r-line"></i>
       Keluar
     </button>
  </nav>

  <!-- MODAL PENGAJUAN PINJAMAN -->
  <div id="modal-pinjam" class="modal" x-data="memberPengajuan()">
     <div class="modal-content max-w-sm mt-auto mb-0 mx-auto rounded-t-3xl rounded-b-none border-t border-slate-200 bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transform transition-transform" @click.outside="document.getElementById('modal-pinjam').classList.remove('active')">
        <div class="flex justify-center pt-2 pb-4">
           <div class="w-12 h-1.5 bg-slate-600 rounded-full"></div>
        </div>
        <div class="px-6 pb-6 space-y-5">
           <div class="text-center">
              <h3 class="text-xl font-bold text-slate-800 mb-1">Pengajuan Pinjaman</h3>
              <p class="text-sm text-slate-600">Ajukan pinjaman koperasi secara online</p>
           </div>
           
           <div class="space-y-4">
              <div class="form-group block">
                 <label class="block text-sm text-slate-600 mb-1">Nominal (Rp)</label>
                 <input type="number" x-model="form.pokok" class="form-control text-right font-mono text-lg bg-slate-100 border-slate-200" placeholder="0" required>
              </div>
              
              <div class="grid grid-cols-2 gap-4">
                 <div class="form-group block">
                    <label class="block text-sm text-slate-600 mb-1">Tenor (Bulan)</label>
                    <select x-model="form.jangka_waktu" class="form-control bg-slate-100 border-slate-200">
                       <option value="6">6 Bulan</option>
                       <option value="12">12 Bulan</option>
                       <option value="24">24 Bulan</option>
                       <option value="36">36 Bulan</option>
                    </select>
                 </div>
                 <div class="form-group block">
                    <label class="block text-sm text-slate-600 mb-1">Skema</label>
                    <select x-model="form.metode_angsuran" class="form-control bg-slate-100 border-slate-200">
                       <option value="flat">Flat</option>
                       <option value="efektif">Efektif</option>
                    </select>
                 </div>
              </div>

              <div class="form-group block">
                 <label class="block text-sm text-slate-600 mb-1">Tujuan Penggunaan</label>
                 <textarea x-model="form.tujuan" class="form-control bg-slate-100 border-slate-200 min-h-[80px]" placeholder="Deskripsikan alasan peminjaman Anda." required></textarea>
              </div>

              <button @click="submit()" class="btn btn-primary w-full h-12 shadow-lg shadow-emerald-500/20" :disabled="loading">
                 <span x-show="!loading"><i class="ri-send-plane-fill mr-1"></i> Kirim Pengajuan</span>
                 <span x-show="loading"><i class="ri-loader-4-line spin"></i> Memproses...</span>
              </button>
           </div>
        </div>
     </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 sm:bottom-4 sm:top-auto z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/modules/member.js"></script>
  <script>
     // Ensure non-members redirect correctly handled by Alpine
     document.addEventListener('alpine:initialized', () => {
        // any custom raw JS hooks
     })
  </script>
</body>
</html>
